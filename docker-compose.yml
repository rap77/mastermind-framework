services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mastermind_bd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api/Dockerfile
    ports:
      - "8001:8001"
      - "50051:50051"  # gRPC port for Phase 13
    volumes:
      - mastermind_data:/app/data
    environment:
      MM_DB_PATH: /app/data/mastermind.db
      MM_ADMIN_PASSWORD: ${MM_ADMIN_PASSWORD:-admin}
      MM_SECRET_KEY: ${MM_SECRET_KEY:-change-me-in-production}
      POSTGRES_URL: postgresql://postgres:devpassword@postgres:5432/mastermind_bd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  control-plane:
    build:
      context: ./apps/control-plane
      dockerfile: ../../docker/control-plane/Dockerfile
    ports:
      - "3001:3001"
    environment:
      CONTROL_PLANE_URL: http://control-plane:3001
      AGENT_RUNTIME_URL: http://api:8001
      POSTGRES_URL: postgresql://postgres:devpassword@postgres:5432/mastermind_bd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Phase 13: CONTROL_PLANE_URL points to Rust gateway (port 3001)
      CONTROL_PLANE_URL: http://control-plane:3001
      AGENT_RUNTIME_URL: http://api:8001
      MM_SECRET_KEY: ${MM_SECRET_KEY:-change-me-in-production}
      NODE_ENV: production
    depends_on:
      control-plane:
        condition: service_healthy

volumes:
  mastermind_data:
  postgres_data:
