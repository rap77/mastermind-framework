services:
  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - mastermind_data:/app/data
    environment:
      MM_DB_PATH: /app/data/mastermind.db
      MM_ADMIN_PASSWORD: ${MM_ADMIN_PASSWORD:-admin}
      MM_SECRET_KEY: ${MM_SECRET_KEY:-change-me-in-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      API_URL: http://api:8001
      MM_SECRET_KEY: ${MM_SECRET_KEY:-change-me-in-production}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

volumes:
  mastermind_data:
