name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/api

jobs:
  level1-typecheck:
    name: Level 1 - Type Check (API)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - run: uv sync
      - run: uv run mypy --strict mastermind_cli/
      - run: uv run ruff check .

  level2-tests:
    name: Level 2 - Tests (API)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - run: uv sync
      - run: uv run pytest tests/unit/ -v --cov=mastermind_cli --cov-report=xml
      - run: uv run pytest tests/integration/ -v -m "not slow"
      - uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          fail_ci_if_error: false

  level3-semantic:
    name: Level 3 - Semantic Integration (API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - run: uv sync
      - run: uv run pytest tests/integration/test_semantic_regression.py -v -m slow
      - run: uv run pytest tests/integration/test_backward_compat.py -v -m slow

  level4-e2e:
    name: Level 4 - E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
        with:
          version: "latest"
      - run: uv sync
      - run: uv run playwright install chromium --with-deps
      - run: uv run uvicorn mastermind_cli.api.app:get_app --factory --port 8000 &
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/ > /dev/null 2>&1 && echo "Ready after ${i}s" && exit 0
            sleep 1
          done
          echo "Server did not start" && exit 1
      - run: uv run pytest tests/e2e/ -m e2e -v --no-cov
