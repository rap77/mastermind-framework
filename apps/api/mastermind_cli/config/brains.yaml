version: "1.2"
# Multi-Niche Support
# This config file supports multiple niches. Each brain has a `niche` field:
# - "software-development": Original niche (brains #1-8)
# - "marketing-digital": Marketing niche (see brains-marketing.yaml)
# - "universal": Cross-niche brains (e.g., Brain #8 Master Interviewer)
#
# The framework loads all *.yaml files from mastermind_cli/config/ and merges them.
