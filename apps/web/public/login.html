<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Maestra - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #000;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 32px;
        }
        h1 { font-size: 32px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        p { font-size: 14px; color: #666; text-align: center; margin-bottom: 32px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: 500; }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error {
            padding: 12px;
            background: #fee;
            color: #c00;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mente Maestra</h1>
        <p>Sign in to access your war room</p>
        <form id="loginForm">
            <div>
                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" required placeholder="admin">
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
            </div>
            <div id="error" class="error" style="display:none"></div>
            <button type="submit" id="submitBtn">Sign in</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('error');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            error.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (response.ok) {
                    window.location.href = '/command-center';
                } else {
                    const data = await response.json();
                    error.textContent = data.error || 'Login failed';
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign in';
                }
            } catch (err) {
                error.textContent = 'Network error. Please try again.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
