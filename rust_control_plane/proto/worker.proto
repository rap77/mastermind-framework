syntax = "proto3";

package mastermind.worker;

service Worker {
  rpc ProcessWebhook(ProcessWebhookRequest) returns (ProcessWebhookResponse);
}

message ProcessWebhookRequest {
  string trace_id = 1;           // Distributed trace ID
  string channel = 2;             // "whatsapp", "instagram", "email"
  string payload = 3;             // JSON webhook payload
  string sender_id = 4;           // Customer identifier
  string message_type = 5;        // "text", "image", "video", etc.
}

message ProcessWebhookResponse {
  bool success = 1;
  string error_message = 2;
  string ai_response = 3;         // Generated response text
  string suggested_channel = 4;   // Channel Router suggestion
  int64 processing_duration_ms = 5;
}
